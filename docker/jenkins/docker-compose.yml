services:
  jenkins-controller:
    image: jenkins/jenkins:lts
    container_name: jenkins-controller
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
      - "50000:50000"
    environment:
      - JAVA_OPTS=-Duser.timezone=Asia/Shanghai
      - TZ=Asia/Shanghai
    volumes:
      - controller_home:/var/jenkins_home
      - /etc/localtime:/etc/localtime:ro

  jenkins-agent-1:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: jenkins-agent-1
    restart: always
    environment:
      - JENKINS_URL=http://jenkins-controller:8080
      - JENKINS_AGENT_NAME=docker-worker-1
      - JENKINS_SECRET=1ae90433bf4445d281cf3c1d711e212e238663d633e41e82a3f8e665ab9a3fb9
      - JAVA_OPTS=-Duser.timezone=Asia/Shanghai
      - TZ=Asia/Shanghai
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agent1_workdir:/home/jenkins/agent
      - /etc/localtime:/etc/localtime:ro

  jenkins-agent-2:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: jenkins-agent-2
    restart: always
    environment:
      - JENKINS_URL=http://jenkins-controller:8080
      - JENKINS_AGENT_NAME=docker-worker-2
      - JENKINS_SECRET=b62e188279928cd470a88b52ed2d0e24c53ea0482d095e71924f299746fd23fa
      - JAVA_OPTS=-Duser.timezone=Asia/Shanghai
      - TZ=Asia/Shanghai
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agent2_workdir:/home/jenkins/agent
      - /etc/localtime:/etc/localtime:ro

volumes:
  controller_home:
  agent1_workdir:
  agent2_workdir:
