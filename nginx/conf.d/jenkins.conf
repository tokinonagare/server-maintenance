# Jenkins upstream
upstream jenkins {
    keepalive 32;
    server 127.0.0.1:8080;
}

# Required for Jenkins websocket agents
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name jenkins.tokinonagare.com;

    # Let’s Encrypt HTTP fallback (optional, DNS-01 实际不依赖这个)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jenkins.tokinonagare.com;

    ssl_certificate     /etc/letsencrypt/live/jenkins.tokinonagare.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jenkins.tokinonagare.com/privkey.pem;

    # 基础 TLS 设置
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Jenkins 官方文档建议
    ignore_invalid_headers off;

    # 大文件和长连接
    client_max_body_size 1g;
    client_body_buffer_size 128k;
    proxy_connect_timeout 90s;
    proxy_send_timeout 90s;
    proxy_read_timeout 3600s;
    sendfile off;

    access_log /var/log/nginx/jenkins.access.log;
    error_log  /var/log/nginx/jenkins.error.log warn;

    # Jenkins 静态资源路径处理
    location ~ "^/static/[0-9a-fA-F]{8}/(.*)$" {
        rewrite "^/static/[0-9a-fA-F]{8}/(.*)" /$1 last;
    }

    location / {
        proxy_pass http://jenkins;
        proxy_redirect default;
        proxy_http_version 1.1;

        # Required for Jenkins websocket agents
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Upgrade           $http_upgrade;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port  443;

        proxy_max_temp_file_size 0;
        proxy_request_buffering off;
    }
}
