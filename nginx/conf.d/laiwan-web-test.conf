server {
    listen 80;
    listen [::]:80;
    server_name 137.131.37.97 laiwan-production-web-test.tokinonagare.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name laiwan-production-web-test.tokinonagare.com;

    ssl_certificate /etc/letsencrypt/live/jenkins.tokinonagare.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jenkins.tokinonagare.com/privkey.pem;

    include /etc/nginx/laiwan-web-test/gate.conf;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    error_page 403 /maintenance.html;

    location = /maintenance.html {
        root /etc/nginx/laiwan-web-test;
        internal;
    }

    location = /admin {
        return 301 /admin/;
    }

    location ^~ /admin/ {
        auth_basic "LaiWan Web Test Admin";
        auth_basic_user_file /etc/nginx/laiwan-web-test/admin.htpasswd;
        proxy_pass http://127.0.0.1:8090/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        if ($laiwan_web_test_gate_open = 0) {
            return 403;
        }

        proxy_pass http://127.0.0.1:8089;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
